# nginx/default.conf
#
# Production reverse proxy + static hosting for the Angular SPA.
#
# Responsibilities:
# - Serve the built Angular static files.
# - Reverse proxy /api/* requests to the backend container (service name: api).
#
# Notes:
# - TLS termination typically happens in front of nginx (or by nginx if you add certs).
# - The proxy target uses plain HTTP on the internal Docker network.

server {
  listen 80;
  server_name _;

  # Large payloads (base64 images) may exceed nginx default limits.
  client_max_body_size 60m;

  # Reverse proxy to the Node API
  location /api/ {
    proxy_pass http://api:3000/api/;
    proxy_http_version 1.1;

    # Preserve useful request metadata
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    # AI requests can be slow
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # Serve SPA and fall back to index.html for client-side routing
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
